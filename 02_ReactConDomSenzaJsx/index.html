<!DOCTYPE html>
<html>
<head>
  <title>Hello React!</title>
</head>

<body>
  <div id="root"></div>

  <script
    src="https://unpkg.com/react@18/umd/react.development.js"
    crossorigin
  ></script>

   <!--scarica libreria react-->
  <script       
    src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
    crossorigin
  ></script>

  <!--creazione componente, trova div con id root e fa root.render per inserire l'header dentro l'elemento con id root-->
  <script>
    function App() {
      return React.createElement("header", null, 'Hello!!');
    }

    const root = ReactDOM.createRoot(
      document.getElementById("root")
    );

    root.render(
      React.createElement(App)
    );
  </script>
</body>
</html>


<!--

internamente il createElement crea un oggetto simile a:

{
  type: "header",
  props: {
    children: "Hello!!"
  }
}
-->
